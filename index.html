<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LCDR LIVE DATA</title>

<style>
body {
  background: url('https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg') no-repeat center center fixed;
  background-size: cover;
  color:#fff;
  font-family: Arial, sans-serif;
  transition: background 1s ease-in-out;
}
body::before {
  content:"";
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  z-index:-1;
}
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 10%;
  background-color: rgba(17,17,17,0.7);
}
.header h1 { margin:0; color:#008080; font-size:24px; }
.date-info { color:#008080; font-size:18px; }
.table-container { width:80%; margin:24px auto; }
.table-header { background-color:#008080; color:#000; font-weight:bold; font-size:18px; padding:10px 16px; border-radius:10px 10px 0 0; }
.toggle-btn { margin:8px 0; font-size:20px; cursor:pointer; background:none; border:none; color:#0ff; }
table { width:100%; border-collapse:collapse; background-color:#5555559e; border-radius:0 0 10px 10px; }
table, th, td { border:1px solid #fff; }
th, td { padding:10px; text-align:center; }
th { font-weight:bold; font-size:16px; }
td { font-size:16px; cursor:pointer; }
.sum-col { background-color:#222; color:#0ff; font-weight:bold; }
</style>
</head>

<body>

<div class="header">
  <h1>LCDR LIVE DATA 2026</h1>
  <div class="date-info" id="date-info">DATE: --</div>
</div>

<!-- FI Station Overview -->
<div class="table-container">
  <div class="table-header">FI Station Overview</div>
  <table id="combined-table">
    <thead>
      <tr>
        <th>NAME</th>
        <th>NDF</th>
        <th>OK</th>
        <th>WAITING</th>
        <th>SCRAP TTL</th>
        <th>SCRAP PNLA</th>
        <th>SUMA CALKOWITA</th>
        <th>TOTAL</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

const apiKey = 'AIzaSyCP7tzYiGwIZ6cymLAlv_9QgPIEshnRgqI';
const sheetId = '10W03bvKlVFlIUcxsHkzP_v_13gtnYRBmnrrO0ujB1bU';

function buildSheetURL(spreadsheetId, sheetName){
  return `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
}

async function getData(sheetName){
  const res = await fetch(buildSheetURL(sheetId, sheetName));
  const data = await res.json();
  return data.values || [];
}

let combinedDataCache = [];

async function fetchAndCacheData(){
  const sheet1 = await getData('FI Station KOVALCHYK Y.');
  const sheet2 = await getData('FI Station 2 ULANOVYCH.R');

  const rows = [...sheet1.slice(1), ...sheet2.slice(1)];

  combinedDataCache = rows.map(r=>({
    date: r[0]||"",
    status: r[4]||"",
    name: r[5]||""
  }));
}

function getLastDate(data){
  const dates = data.map(r=> new Date(r.date)).filter(d=>!isNaN(d));
  return dates.length ? new Date(Math.max(...dates)) : new Date();
}

function displayCombinedStats(filtered){

  const stats = {};

  filtered.forEach(r=>{
    const n = r.name || "UNKNOWN";

    if(!stats[n])
      stats[n] = {NDF:0,OK:0,WAITING:0,'SCRAP TTL':0,'SCRAP PNLA':0,total:0};

    if(r.status==="NDF") stats[n].NDF++;
    if(r.status==="OK") stats[n].OK++;
    if(r.status==="WAITING") stats[n].WAITING++;
    if(r.status==="SCRAP TTL") stats[n]["SCRAP TTL"]++;
    if(r.status==="SCRAP PNLA") stats[n]["SCRAP PNLA"]++;

    stats[n].total++;
  });

  const tbody=document.querySelector('#combined-table tbody');
  tbody.innerHTML="";

  for(let name in stats){

    const row=document.createElement('tr');

    const tdName=document.createElement('td');
    tdName.textContent=name;
    row.appendChild(tdName);

    let manualSum = 0;

    ["NDF","OK","WAITING","SCRAP TTL","SCRAP PNLA"].forEach(k=>{
      const value = stats[name][k] || 0;
      manualSum += value;

      const td=document.createElement('td');
      td.textContent=value;
      row.appendChild(td);
    });

    // SUMA CALKOWITA
    const tdSuma=document.createElement('td');
    tdSuma.textContent=manualSum;
    row.appendChild(tdSuma);

    // TOTAL
    const tdTotal=document.createElement('td');
    tdTotal.textContent=stats[name].total || 0;
    tdTotal.className="sum-col";
    row.appendChild(tdTotal);

    tbody.appendChild(row);
  }
}

async function updateStats(){
  await fetchAndCacheData();
  const lastDate=getLastDate(combinedDataCache);
  const lastDateStr=lastDate.toISOString().split('T')[0];

  document.getElementById('date-info').textContent=`DATE: ${lastDateStr}`;

  const filtered=combinedDataCache.filter(r=>r.date.includes(lastDateStr));
  displayCombinedStats(filtered);
}

updateStats();
setInterval(updateStats,25000);

</script>

</body>
</html>
