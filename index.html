<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LCDR LIVE DATA</title>

  <style>
    body {
      background: url('https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg')
                  no-repeat center center fixed;
      background-size: cover;
      color:#fff;
      font-family: Arial, sans-serif;
      transition: background 1s ease-in-out;
    }

    body::before {
      content:"";
      position: fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.5);
      z-index:-1;
    }

    .header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 10%;
      background-color: rgba(17,17,17,0.7);
    }

    .header h1 {
      margin:0;
      color:#008080;
      font-size:24px;
    }

    .date-info {
      color:#0ff;
      font-size:22px;
      font-weight: bold;
      background: rgba(0,0,0,0.3);
      padding: 8px 15px;
      border-radius: 8px;
      border: 1px solid #008080;
    }

    /* АНИМАЦИЯ ПУЛЬСАЦИИ СТРОКИ */
    @keyframes row-pulse {
      0% { background-color: rgba(0, 255, 255, 0); }
      50% { background-color: rgba(0, 255, 255, 0.25); }
      100% { background-color: rgba(0, 255, 255, 0); }
    }

    .blink-row {
      animation: row-pulse 2s infinite ease-in-out;
      border-left: 5px solid #0ff !important;
    }

    .table-container {
      width:80%;
      margin:24px auto;
    }

    .table-header {
      background-color:#008080;
      color:#000;
      font-weight:bold;
      font-size:18px;
      padding:10px 16px;
      border-radius:10px 10px 0 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .toggle-btn {
      margin:8px 0;
      font-size:20px;
      cursor:pointer;
      background:none;
      border:none;
      color:#0ff;
    }

    table {
      width:100%;
      border-collapse:collapse;
      background-color:#5555559e;
      border-radius:0 0 10px 10px;
    }

    table, th, td {
      border:1px solid #fff;
    }

    th, td {
      padding:10px;
      text-align:center;
    }

    th { font-weight:bold; font-size:16px; }
    td { font-size:16px; cursor:pointer; }

    .total-row {
      font-weight:bold;
      background-color:#333;
      color:#008080;
    }

    .sum-col {
      background-color:#222;
      color:#0ff;
    }

    #search {
      width:80%;
      padding:12px;
      font-size:16px;
      border-radius:5px;
      border:none;
      margin:20px auto;
      display:block;
    }

    #search-result table {
      margin-top:10px;
      border:2px solid #0ff;
    }

    #modal {
      display:none;
      position:fixed;
      top:0; left:0; width:100%; height:100%;
      background: rgba(0,0,0,0.7);
      justify-content:center; align-items:center; z-index:10000;
    }

    #modal.show { display:flex; }

    #modal-content {
      background:#222; color:#0ff; padding:20px;
      border:2px solid #0ff; border-radius:10px;
      max-height:80%; overflow:auto; width:320px;
    }

    #copy-btn {
      background: #0ff; color: #000; border: none; padding: 5px 10px;
      cursor: pointer; font-weight: bold; margin-left: 10px; margin-bottom: 10px;
    }

    #secret-btn-kovalchyk {
      cursor: pointer; opacity: 0.1; font-size: 14px;
      transition: opacity 0.3s; user-select: none; padding: 0 5px;
    }
    #secret-btn-kovalchyk:hover { opacity: 1; }

    .sn-list-item {
      padding: 5px; border-bottom: 1px dashed #444; font-family: monospace;
    }

    @media (max-width: 900px) {
      .table-container { width:95%; }
      .header { padding:12px 4%; flex-direction: column; text-align: center; gap: 10px; }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>LCDR LIVE DATA 2026</h1>
    <div class="date-info" id="date-info">DATE: --</div>
  </div>

  <div class="table-container">
    <input type="text" id="search" placeholder="Podaj SN / pn czesci">
    <div id="search-result"></div>
  </div>

  <div class="table-container">
    <button id="overview-toggle" class="toggle-btn">👁</button>
    <div id="overview-block">
      <div class="table-header">
        <span>FI Station Overview</span>
        <span id="secret-btn-kovalchyk">·</span>
      </div>
      <table id="combined-table">
        <thead>
          <tr>
            <th>NAME</th><th>NDF</th><th>OK</th><th>WAITING</th><th>SCRAP TTL</th><th>SCRAP PNLA</th><th>SUMA CALKOWITA</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div class="table-container">
    <button id="diag-toggle" class="toggle-btn">👁</button>
    <div id="diag-block">
      <div class="table-header">FI Station Diagonals</div>
      <table id="diag-table">
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

  <div id="modal">
    <div id="modal-content">
      <button id="copy-btn">Copy SN</button>
      <div id="modal-body"></div>
    </div>
  </div>

  <script>
    const apiKey = 'AIzaSyCP7tzYiGwIZ6cymLAlv_9QgPIEshnRgqI';
    const sheetId = '10W03bvKlVFlIUcxsHkzP_v_13gtnYRBmnrrO0ujB1bU';
    const sheetIdArchive = '1UWu4bcuHg6NHhK8ZvjDlQAIue6R1FLBlmAlBhHBj-D8';
    
    let currentLastDate = "";

    function buildSheetURL(spreadsheetId, sheetName) {
      return `https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`;
    }

    async function getData(sheetName, spreadsheetId = sheetId) {
      try {
        const res = await fetch(buildSheetURL(spreadsheetId, sheetName));
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        return data.values || [];
      } catch (e) { console.error(e); return []; }
    }

    let combinedDataCache = [];

    const diagonalMapPrefix = { 'WH8':55,'WC8':32,'WU0':43,'SQ1':43,'WM5':50,'WC7':32,'WP5':65,'WW1':75,'WM6':50 };
    const diagonalMapSuffix = { '860':86,'850':85,'750':75,'700':70,'650':65,'580':58,'575':58,'550':55,'545':55,'500':50,'498':50,'495':50,'490':50,'438':43,'435':43,'430':43,'428':43,'425':43,'420':43,'418':43,'415':43,'398':43,'395':43,'390':43,'348':32,'345':32,'340':32,'328':32,'325':32,'320':32,'318':32,'315':32,'278':27,'275':27,'270':27,'248':24,'245':24,'240':24,'238':24,'235':24,'230':24 };

    function extractDiagonal(serial) {
      if (!serial) return null;
      const s = serial.trim();
      if (s.length >= 3 && diagonalMapPrefix[s.substr(0,3)]) return diagonalMapPrefix[s.substr(0,3)];
      if (s.length >= 6 && diagonalMapSuffix[s.substr(3,3)]) return diagonalMapSuffix[s.substr(3,3)];
      return diagonalMapSuffix[s.slice(-3)] || null;
    }

    async function fetchAndCacheData() {
      const [sheetK, sheetU, sheetA] = await Promise.all([
        getData('FI Station KOVALCHYK Y.'),
        getData('FI Station 2 ULANOVYCH.R'),
        getData('2024', sheetIdArchive)
      ]);
      const rowsK = (sheetK.slice(1) || []).map(r => ({ ...mapRow(r), inspector: 'KOVALCHYK Y.' }));
      const rowsU = (sheetU.slice(1) || []).map(r => ({ ...mapRow(r), inspector: 'ULANOVYCH.R' }));
      const rowsA = (sheetA.slice(1) || []).map(r => ({ ...mapRow(r), inspector: 'ARCHIVE' }));
      combinedDataCache = [...rowsK, ...rowsU, ...rowsA];
    }

    function mapRow(r) { return { date: r[0]||"", serial: r[2]||"", status: r[4]||"", name: r[5]||"", ocAfterRepair: r[9]||"", comment: r[10]||"" }; }

    function parseDatePart(val) {
      if (!val) return null;
      const first = val.split(' ')[0].trim();
      if (/^\d{4}-\d{2}-\d{2}$/.test(first)) return new Date(first);
      if (/^\d{2}\.\d{2}\.\d{4}$/.test(first)) {
        const [d,m,y] = first.split('.'); return new Date(`${y}-${m}-${d}`);
      }
      const parsed = Date.parse(first);
      return isNaN(parsed) ? null : new Date(parsed);
    }

    function getLastDate(data) {
      const dates = data.map(r => parseDatePart(r.date)).filter(d => d instanceof Date && !isNaN(d));
      return dates.length ? new Date(Math.max(...dates)) : new Date();
    }

    const modal = document.getElementById('modal');
    const modalBody = document.getElementById('modal-body');
    const copyBtn = document.getElementById('copy-btn');
    modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });

    document.getElementById('secret-btn-kovalchyk').onclick = () => {
      const records = combinedDataCache.filter(r => 
        r.inspector === 'KOVALCHYK Y.' && (r.date || '').split(' ')[0] === currentLastDate &&
        (r.status === 'OK' || r.status === 'NDF' || r.status === 'SCRAP TTL')
      );
      let html = `<h4 style="margin:0; color:#008080;">Kovalchyk Y. (SN List)</h4>`;
      if (!records.length) { html += "<p>Brak SN za dziś.</p>"; copyBtn.style.display="none"; }
      else { 
        copyBtn.style.display="inline-block"; 
        records.forEach(r => html += `<div class="sn-list-item">${r.serial}</div>`); 
      }
      modalBody.innerHTML = html;
      modal.classList.add('show');
      copyBtn.onclick = () => {
        navigator.clipboard.writeText(records.map(r => r.serial).join('\n')).then(() => {
          copyBtn.textContent = "Copied!"; setTimeout(() => copyBtn.textContent = "Copy SN", 1500);
        });
      };
    };

    function openModal(name) {
      copyBtn.style.display = "none";
      const records = combinedDataCache.filter(r => r.name === name && (r.date || '').split(' ')[0] === currentLastDate);
      let html = records.length ? '<table><tr><th>Serial</th><th>Status</th></tr>' + 
                 records.map(r => `<tr><td>${r.serial}</td><td>${r.status}</td></tr>`).join('') + '</table>' 
                 : "<p>Brak danych.</p>";
      modalBody.innerHTML = html;
      modal.classList.add('show');
    }

    function displayCombinedStats(filtered) {
      const stats = {};
      let tNDF=0, tOK=0, tWAIT=0, tTTL=0, tPNLA=0, gTotal=0;
      filtered.forEach(r => {
        const n = r.name || 'UNKNOWN';
        if (!stats[n]) stats[n] = { NDF:0, OK:0, WAITING:0, 'SCRAP TTL':0, 'SCRAP PNLA':0, total:0 };
        if (r.status === "NDF") { stats[n].NDF++; tNDF++; }
        else if (r.status === "OK") { stats[n].OK++; tOK++; }
        else if (r.status === "WAITING") { stats[n].WAITING++; tWAIT++; }
        else if (r.status === "SCRAP TTL") { stats[n]["SCRAP TTL"]++; tTTL++; }
        else if (r.status === "SCRAP PNLA") { stats[n]["SCRAP PNLA"]++; tPNLA++; }
        stats[n].total++; gTotal++;
      });
      const tbody = document.querySelector('#combined-table tbody');
      tbody.innerHTML = "";
      for (let name in stats) {
        const row = document.createElement('tr');
        row.innerHTML = `<td onclick="openModal('${name}')">${name}</td>
                         <td>${stats[name].NDF}</td><td>${stats[name].OK}</td>
                         <td>${stats[name].WAITING}</td><td>${stats[name]['SCRAP TTL']}</td>
                         <td>${stats[name]['SCRAP PNLA']}</td><td class="sum-col">${stats[name].total}</td>`;
        tbody.appendChild(row);
      }
      const tr = document.createElement('tr'); tr.className = "total-row";
      tr.innerHTML = `<td>TOTAL</td><td>${tNDF}</td><td>${tOK}</td><td>${tWAIT}</td><td>${tTTL}</td><td>${tPNLA}</td><td class="sum-col">${gTotal}</td>`;
      tbody.appendChild(tr);
    }

    function displayDiagonalStats(filtered) {
      const diagStats = {};
      filtered.forEach(({name, serial, status}) => {
        if (status !== "OK" && status !== "NDF") return;
        const diag = extractDiagonal(serial); if (!diag) return;
        const nm = name || 'UNKNOWN';
        if (!diagStats[nm]) diagStats[nm] = {};
        diagStats[nm][diag] = (diagStats[nm][diag] || 0) + 1;
      });
      const tbody = document.querySelector('#diag-table tbody');
      const thead = document.querySelector('#diag-table thead');
      const allDiagonals = new Set();
      Object.values(diagStats).forEach(obj => Object.keys(obj).forEach(k => allDiagonals.add(Number(k))));
      const allDiags = Array.from(allDiagonals).sort((a,b) => a - b);
      thead.innerHTML = `<tr><th>NAME</th>${allDiags.map(d => `<th>${d}</th>`).join('')}<th class="sum-col">SUMA</th></tr>`;
      tbody.innerHTML = '';
      Object.entries(diagStats).forEach(([name, diags]) => {
        const row = document.createElement('tr');
        let sum = 0;
        let cells = allDiags.map(d => { const v = diags[d]||0; sum+=v; return `<td>${v}</td>`; }).join('');
        row.innerHTML = `<td>${name}</td>${cells}<td class="sum-col">${sum}</td>`;
        tbody.appendChild(row);
      });
    }

    async function updateStats() {
      await fetchAndCacheData();
      const lastDate = getLastDate(combinedDataCache);
      currentLastDate = lastDate ? lastDate.toISOString().split('T')[0] : "";
      document.getElementById('date-info').textContent = `DATE: ${currentLastDate || '--'}`;
      
      const filtered = combinedDataCache.filter(r => (r.date || '').split(' ')[0] === currentLastDate);
      displayCombinedStats(filtered);
      displayDiagonalStats(filtered);
    }

    const searchInput = document.getElementById('search');
    searchInput.onkeypress = async e => {
      if (e.key === 'Enter') {
        const val = e.target.value.trim();
        const output = document.getElementById('search-result');
        output.innerHTML = "<p>Szukam...</p>";
        const matches = combinedDataCache.filter(r => (r.serial || '').trim() === val);
        if (matches.length) {
          matches.sort((a,b) => (parseDatePart(b.date)||0) - (parseDatePart(a.date)||0));
          let rows = matches.map((m, index) => {
            const isLatestInSearch = (index === 0); 
            return `<tr class="${isLatestInSearch ? 'blink-row' : ''}">
                      <td>${m.date}</td><td>${m.status}</td><td>${m.name || '--'}</td>
                      <td>${m.ocAfterRepair || '--'}</td><td>${m.comment || '--'}</td>
                    </tr>`;
          }).join('');
          output.innerHTML = `<table><thead><tr><th>Data</th><th>Status</th><th>NAPRAWIACZ</th><th>FINALNA</th><th>INFO</th></tr></thead>
                              <tbody>${rows}</tbody></table>`;
        } else { output.innerHTML = "<p>Brak info!</p>"; }
      }
    };

    document.getElementById('overview-toggle').onclick = () => {
      const b = document.getElementById('overview-block'); b.style.display = b.style.display==='none'?'block':'none';
    };
    document.getElementById('diag-toggle').onclick = () => {
      const b = document.getElementById('diag-block'); b.style.display = b.style.display==='none'?'block':'none';
    };

    updateStats();
    setInterval(updateStats, 25000);

    const backgrounds = [
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-carlos-oliva-1966452-3586966.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-eberhardgross-1367192.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-eberhardgross-640781.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-francesco-ungaro-1526713.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-gochrisgoxyz-1643409.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-joshkjack-135018.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-pixabay-326055.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-rickyrecap-2627063.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-rpnickson-2478248.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-sanaan-3075993.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-simon73-1183099.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-pengwhan-1767434.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-pixabay-533923.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-robshumski-1903702.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-elti-meshau-107925-333850.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-harun-tan-2311991-3980364.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-joyston-judah-331625-933054.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-francesco-ungaro-464336.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-pixabay-35857.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-jahoo-388415.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-therato-1933320.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-quang-nguyen-vinh-222549-2166711.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-thanhhoa-tran-640546-1462892.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-jplenio-3131634.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-quang-nguyen-vinh-222549-2563129.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-david-bartus-43782-2379653.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-dreamypixel-547114.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-sebastiaan9977-1097456.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-souvenirpixels-1519088.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-stywo-1261731.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-thatguycraig000-1563355.jpg",
      "https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-thatguycraig000-1563356.jpg"
    ];
    let bgIndex = 0;
    setInterval(() => {
      bgIndex = (bgIndex + 1) % backgrounds.length;
      document.body.style.background = `url('${backgrounds[bgIndex]}') no-repeat center center fixed`;
      document.body.style.backgroundSize = "cover";
    }, 180000);
  </script>
</body>
</html>
