<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>LCDR LIVE DATA 2026</title>

<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#008080">

<style>
body {
background: url('https://raw.githubusercontent.com/iDLC1990/status-dashboard/main/pexels-iriser-1366957.jpg')
no-repeat center center fixed;
background-size: cover;
color:#fff;
font-family: Arial, sans-serif;
transition: background 1s ease-in-out;
margin: 0;
}

body::before {
content:"";
position: fixed;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.5);
z-index:-1;
}

.header {
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 10%;
background-color: rgba(17,17,17,0.7);
border-bottom: 1px solid #008080;
}

.header h1 {
margin:0;
color:#008080;
font-size:24px;
}

.date-controls {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 5px;
}

#date-picker {
    background: #111;
    color: #0ff;
    border: 1px solid #008080;
    padding: 4px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
}

.date-info {
color:#008080;
font-size:16px;
font-weight: bold;
}

.table-container {
width:80%;
margin:24px auto;
}

.table-header {
background-color:#008080;
color:#000;
font-weight:bold;
font-size:18px;
padding:10px 16px;
border-radius:10px 10px 0 0;
display: flex;
justify-content: space-between;
align-items: center;
}

.toggle-btn {
margin:8px 0;
font-size:20px;
cursor:pointer;
background:none;
border:none;
color:#0ff;
}

table {
width:100%;
border-collapse:collapse;
background-color:#5555559e;
border-radius:0 0 10px 10px;
}

table, th, td {
border:1px solid #fff;
}

th, td {
padding:10px;
text-align:center;
}

th {
font-weight:bold;
font-size:16px;
}

td {
font-size:16px;
cursor:pointer;
}

.total-row {
font-weight:bold;
background-color:#333;
color:#008080;
}

.sum-col {
background-color:#222;
color:#0ff;
}

#search {
width:100%;
padding:12px;
font-size:16px;
border-radius:5px;
border:none;
margin-bottom: 20px;
display:block;
outline: none;
box-sizing: border-box;
}

#search-result {
margin-bottom: 25px;
}

#search-result table {
border:2px solid #0ff;
background-color:#333;
}

@keyframes blink-active {
  0% { background-color: rgba(0, 128, 128, 0.3); }
  50% { background-color: rgba(0, 255, 255, 0.6); }
  100% { background-color: rgba(0, 128, 128, 0.3); }
}

.latest-record {
  animation: blink-active 1.5s infinite;
  border: 2px solid #0ff !important;
  font-weight: bold;
}

#modal {
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background: rgba(0,0,0,0.7);
justify-content:center;
align-items:center;
z-index:10000;
}

#modal.show { display:flex; }

#modal-content {
background:#222;
color:#0ff;
padding:20px;
border:2px solid #0ff;
border-radius:10px;
max-height:80%;
overflow:auto;
width:80%;
max-width:900px;
}

#modal-close {
background:#008080;
color:#000;
border:none;
padding:5px 15px;
cursor:pointer;
font-weight:bold;
margin-bottom:10px;
border-radius: 4px;
}

.header-actions {
    display: flex;
    align-items: center;
    gap: 15px;
}

#bulk-search-btn { cursor: pointer; font-size: 18px; opacity: 0.7; transition: opacity 0.3s; }
#bulk-search-btn:hover { opacity: 1; }

#secret-btn-kovalchyk {
cursor: pointer;
opacity: 0.3;
font-size: 18px;
transition: all 0.3s;
user-select: none;
padding: 0 5px;
color: #0ff;
}

#secret-btn-kovalchyk:hover { opacity: 1; text-shadow: 0 0 5px #0ff; }

#bulk-input {
    width: 100%;
    height: 120px;
    background: #111;
    color: #0ff;
    border: 1px solid #008080;
    padding: 10px;
    margin-top: 10px;
    font-family: monospace;
    resize: vertical;
    box-sizing: border-box;
}

#run-bulk-search {
    background: #008080;
    color: #000;
    border: none;
    padding: 8px 20px;
    margin-top: 10px;
    cursor: pointer;
    font-weight: bold;
    border-radius: 4px;
}

@media (max-width: 900px) {
.table-container { width:95%; }
.header { padding:12px 4%; }
.header h1 { font-size: 18px; }
}
</style>
</head>
<body>

<div class="header">
    <h1>LCDR LIVE DATA 2026</h1>
    <div class="date-controls">
        <input type="date" id="date-picker">
        <div class="date-info" id="date-info">DATE: --</div>
    </div>
</div>

<div class="table-container">
    <input type="text" id="search" placeholder="Podaj SN / pn czesci (Enter)">
    <div id="search-result"></div>
</div>

<div class="table-container">
    <button id="overview-toggle" class="toggle-btn">FI Overview</button>
    <div id="overview-block">
        <div class="table-header">
            <span>FI Station Overview</span>
            <div class="header-actions">
                <span id="bulk-search-btn" title="Bulk Search">🔍</span>
                <span id="secret-btn-kovalchyk" title="Copy Today's SN">·</span>
            </div>
        </div>
        <table id="combined-table">
            <thead>
                <tr>
                    <th>NAME</th>
                    <th>NDF</th>
                    <th>OK</th>
                    <th>WAITING</th>
                    <th>SCRAP TTL</th>
                    <th>SCRAP PNLA</th>
                    <th class="sum-col">SUMA CALKOWITA</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div class="table-container">
    <button id="diag-toggle" class="toggle-btn">FI Diagonals</button>
    <div id="diag-block">
        <div class="table-header">FI Station Diagonals</div>
        <table id="diag-table">
            <thead></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<div id="modal">
    <div id="modal-content">
        <button id="modal-close">Close</button>
        <div id="modal-body"></div>
    </div>
</div>

<script>
// --- Configuration ---
const apiKey = 'AIzaSyCP7tzYiGwIZ6cymLAlv_9QgPIEshnRgqI';
const sheetId = '10W03bvKlVFlIUcxsHkzP_v_13gtnYRBmnrrO0ujB1bU';
const sheetIdArchive = '1UWu4bcuHg6NHhK8ZvjDlQAIue6R1FLBlmAlBhHBj-D8';

let combinedDataCache = []; 
const datePicker = document.getElementById('date-picker');

const diagonalMapPrefix = {'WH8':55,'WC8':32,'WU0':43,'SQ1':43,'WM5':50,'WC7':32,'WP5':65,'WW1':75,'WM6':50};
const diagonalMapSuffix = {'860':86,'850':85,'750':75,'700':70,'650':65,'580':58,'575':58,'550':55,'545':55,'500':50,'498':50,'495':50,'490':50,'438':43,'435':43,'430':43,'428':43,'425':43,'420':43,'418':43,'415':43,'398':43,'395':43,'390':43,'348':32,'345':32,'340':32,'328':32,'325':32,'320':32,'318':32,'315':32,'278':27,'275':27,'270':27,'248':24,'245':24,'240':24,'238':24,'235':24,'230':24};

// --- Helper Functions ---
function extractDiagonal(serial) {
    if (!serial) return null;
    const s = serial.trim();
    return diagonalMapPrefix[s.substring(0, 3)] || 
           diagonalMapSuffix[s.substring(3, 6)] || 
           diagonalMapSuffix[s.slice(-3)] || null;
}

function parseDatePart(val) {
    if (!val) return null;
    const first = val.split(' ')[0].trim();
    if (/^\d{4}-\d{2}-\d{2}$/.test(first)) return new Date(first);
    if (/^\d{2}\.\d{2}\.\d{4}$/.test(first)) {
        const [d,m,y] = first.split('.');
        return new Date(`${y}-${m}-${d}`);
    }
    const parsed = Date.parse(first);
    return isNaN(parsed) ? null : new Date(parsed);
}

function getLastDate(data) {
    const dates = data.map(r => parseDatePart(r.date)).filter(d => d instanceof Date && !isNaN(d));
    return dates.length ? new Date(Math.max(...dates.map(d => d.getTime()))) : new Date();
}

async function getData(sheetName, spreadsheetId = sheetId) {
    try {
        const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${spreadsheetId}/values/${encodeURIComponent(sheetName)}?key=${apiKey}`);
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        return data.values || [];
    } catch (e) {
        console.error(`Fetch error ${sheetName}:`, e);
        return null; 
    }
}

async function fetchAndCacheData() {
    const [s1, s2, s3] = await Promise.all([
        getData('FI Station KOVALCHYK Y.', sheetId),
        getData('FI Station 2 ULANOVYCH.R', sheetId),
        getData('2024', sheetIdArchive)
    ]);

    if (!s1 && !s2) return false;

    const mapR = (r, insp) => ({
        date: r[0] || "", 
        serial: (r[2] || "").trim(), 
        type: (r[3] || "").trim().toUpperCase(), 
        status: (r[4] || "").trim().toUpperCase(),
        name: r[5] || "", 
        nameG: r[6] || "", 
        ocAfterRepair: r[9] || "", 
        comment: r[10] || "", 
        inspector: insp
    });

    combinedDataCache = [
        ...(s1 ? s1.slice(1) : []).map(r => mapR(r, 'KOVALCHYK Y.')),
        ...(s2 ? s2.slice(1) : []).map(r => mapR(r, 'ULANOVYCH.R')),
        ...(s3 ? s3.slice(1) : []).map(r => mapR(r, 'ARCHIVE'))
    ];
    return true;
}

// --- UI Logic ---
function updateStatsDisplay(targetDateStr) {
    document.getElementById('date-info').textContent = `VIEWING: ${targetDateStr}`;
    const filtered = combinedDataCache.filter(r => (r.date || '').split(' ')[0] === targetDateStr);
    displayCombinedStats(filtered);
    displayDiagonalStats(filtered);
}

function displayCombinedStats(filtered) {
    const stats = {};
    let tNDF=0, tOK=0, tWAIT=0, tTTL=0, tPNLA=0, gTotal=0;
    filtered.forEach(r => {
        const n = r.name || 'UNKNOWN';
        if (!stats[n]) stats[n] = { NDF:0, OK:0, WAITING:0, 'SCRAP TTL':0, 'SCRAP PNLA':0, total:0 };
        if (r.status === "NDF") { stats[n].NDF++; tNDF++; }
        if (r.status === "OK") { stats[n].OK++; tOK++; }
        if (r.status === "WAITING") { stats[n].WAITING++; tWAIT++; }
        if (r.status === "SCRAP TTL") { stats[n]["SCRAP TTL"]++; tTTL++; }
        if (r.status === "SCRAP PNLA") { stats[n]["SCRAP PNLA"]++; tPNLA++; }
        stats[n].total++; gTotal++;
    });
    const tbody = document.querySelector('#combined-table tbody');
    tbody.innerHTML = "";
    Object.keys(stats).sort().forEach(name => {
        const row = document.createElement('tr');
        row.innerHTML = `<td onclick="openModal('${name}')">${name}</td><td>${stats[name].NDF}</td><td>${stats[name].OK}</td><td>${stats[name].WAITING}</td><td>${stats[name]['SCRAP TTL']}</td><td>${stats[name]['SCRAP PNLA']}</td><td class="sum-col">${stats[name].total}</td>`;
        tbody.appendChild(row);
    });
    const tr = document.createElement('tr'); tr.className = "total-row";
    tr.innerHTML = `<td>TOTAL</td><td>${tNDF}</td><td>${tOK}</td><td>${tWAIT}</td><td>${tTTL}</td><td>${tPNLA}</td><td class="sum-col">${gTotal}</td>`;
    tbody.appendChild(tr);
}

function displayDiagonalStats(filtered) {
    const diagStats = {};
    filtered.forEach(({name, serial, status}) => {
        if (status !== "OK" && status !== "NDF") return;
        const diag = extractDiagonal(serial); if (!diag) return;
        const nm = name || 'UNKNOWN';
        if (!diagStats[nm]) diagStats[nm] = {};
        diagStats[nm][diag] = (diagStats[nm][diag] || 0) + 1;
    });
    const tbody = document.querySelector('#diag-table tbody');
    const thead = document.querySelector('#diag-table thead');
    const allDiagonals = [...new Set(Object.values(diagStats).flatMap(o => Object.keys(o)))].map(Number).sort((a,b)=>a-b);
    thead.innerHTML = `<tr><th>NAME</th>${allDiagonals.map(d => `<th>${d}</th>`).join('')}<th class="sum-col">SUMA</th></tr>`;
    tbody.innerHTML = '';
    Object.entries(diagStats).sort().forEach(([name, diags]) => {
        const row = document.createElement('tr');
        row.innerHTML = `<td>${name}</td>` + allDiagonals.map(d => `<td>${diags[d]||0}</td>`).join('') + `<td class="sum-col">${Object.values(diags).reduce((a,b)=>a+b,0)}</td>`;
        tbody.appendChild(row);
    });
}

// --- Search & Modal ---
const modal = document.getElementById('modal');
const modalBody = document.getElementById('modal-body');
document.getElementById('modal-close').onclick = () => modal.classList.remove('show');

document.getElementById('search').onkeypress = async e => {
    if (e.key === 'Enter') {
        const serial = e.target.value.trim();
        const matches = combinedDataCache.filter(r => r.serial === serial).sort((a,b) => (parseDatePart(b.date)||0) - (parseDatePart(a.date)||0));
        const output = document.getElementById('search-result');
        if (matches.length) {
            output.innerHTML = `<table><thead><tr><th>Data</th><th>Status</th><th>NAPRAWIACZ</th><th>FINALNA</th><th>INFO</th></tr></thead>
            <tbody>${matches.map((d, i) => `<tr ${i===0?'class="latest-record"':''}><td>${d.date}</td><td>${d.status}</td><td>${d.name}</td><td>${d.nameG}</td><td>${d.comment}</td></tr>`).join('')}</tbody></table>`;
        } else { output.innerHTML = "<p style='color:yellow'>Brak info!</p>"; }
    }
};

function openModal(name) {
    const targetDate = datePicker.value;
    const records = combinedDataCache.filter(r => r.name === name && (r.date || '').split(' ')[0] === targetDate);
    if (!records.length) { modalBody.innerHTML = "<p>Brak данных</p>"; } 
    else {
        let html = `<h3>${name} (${targetDate})</h3><table><tr><th>Serial</th><th>Type</th><th>Status</th><th>OC</th><th>COMMENT</th></tr>`;
        records.forEach(r => { html += `<tr><td>${r.serial}</td><td>${r.type}</td><td>${r.status}</td><td>${r.ocAfterRepair}</td><td>${r.comment}</td></tr>`; });
        modalBody.innerHTML = html + '</table>';
    }
    modal.classList.add('show');
}

// Bulk Search
document.getElementById('bulk-search-btn').onclick = () => {
    modalBody.innerHTML = `<h3>Bulk Search</h3><textarea id="bulk-input" placeholder="Wklej listę SN..."></textarea><button id="run-bulk-search">SZUKAJ</button><div id="bulk-result"></div>`;
    modal.classList.add('show');
    document.getElementById('run-bulk-search').onclick = () => {
        const snList = document.getElementById('bulk-input').value.split('\n').map(s => s.trim()).filter(s => s);
        let html = `<table><tr><th>Serial</th><th>Data</th><th>Status</th><th>Naprawiacz</th></tr>`;
        snList.forEach(sn => {
            const m = combinedDataCache.filter(r => r.serial === sn).sort((a,b) => (parseDatePart(b.date)||0) - (parseDatePart(a.date)||0))[0];
            html += m ? `<tr><td>${m.serial}</td><td>${m.date}</td><td>${m.status}</td><td>${m.name}</td></tr>` 
                      : `<tr style="color:#ff5555"><td>${sn}</td><td colspan="3">NOT FOUND</td></tr>`;
        });
        document.getElementById('bulk-result').innerHTML = html + `</table>`;
    };
};

// Copy Button Logic
document.getElementById('secret-btn-kovalchyk').onclick = function() {
    const targetDate = datePicker.value;
    const snList = combinedDataCache
        .filter(r => r.inspector === 'KOVALCHYK Y.' && (r.date || '').split(' ')[0] === targetDate && ['OK','NDF','SCRAP TTL'].includes(r.status) && r.type !== 'MNT')
        .map(r => r.serial).join('\n');
    if (snList) {
        navigator.clipboard.writeText(snList).then(() => {
            const old = this.textContent; this.textContent = "✓";
            setTimeout(() => this.textContent = old, 1200);
        });
    }
};

// --- Initialization ---
async function startApp() {
    if (await fetchAndCacheData()) {
        const lastDate = getLastDate(combinedDataCache);
        const lastStr = lastDate.toISOString().split('T')[0];
        datePicker.value = lastStr;
        updateStatsDisplay(lastStr);
    }
}

datePicker.onchange = (e) => updateStatsDisplay(e.target.value);
document.getElementById('overview-toggle').onclick = () => { const b = document.getElementById('overview-block'); b.style.display = b.style.display==='none'?'block':'none' };
document.getElementById('diag-toggle').onclick = () => { const b = document.getElementById('diag-block'); b.style.display = b.style.display==='none'?'block':'none' };

startApp();
setInterval(fetchAndCacheData, 60000);

// PWA Service Worker
if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log('SW Registration failed:', err));
    });
}
</script>
</body>
</html>
